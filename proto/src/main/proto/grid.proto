syntax = "proto3";

package gridcomputing;

option java_package = "com.gridcomputing.proto";
option java_outer_classname = "GridProto";
option java_multiple_files = true;


message SubTask {
  string subtask_id = 1;
  string task_id = 2;
  bytes input_data = 3;
}

message SubTaskResult {
  string subtask_id = 1;
  bytes output_data = 2;
  bool success = 3;
  optional string message = 4;
}

message TaskBundle {
  string task_id = 1;
  bytes jar_data = 2;
  bytes shared_data = 3;
}

message Ack {
  bool success = 1;
  string message = 2;
}

message NodeInfo {
  string node_id = 1;
  string host = 2;
  int32 port = 3;
}


service DistributorService {
  rpc uploadTaskBundle(TaskBundle) returns (Ack);

  rpc processSubTasks (stream SubTask) returns (stream SubTaskResult);
}

service ExecutorService {
  rpc uploadTaskBundle(TaskBundle) returns (Ack);

  rpc executeSubTask(SubTask) returns (SubTaskResult);
}